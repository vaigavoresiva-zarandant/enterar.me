# ============================================================
# ENTERAR.ME — Directus 11 schema snapshot
# ------------------------------------------------------------
# Aplicar con:
#   npx directus schema apply ./snapshots/schema-snapshot.yaml
# o vía API:
#   POST /schema/snapshot  (con token de admin)
#
# Convenciones:
#   - Todas las PKs operacionales son UUID (gen_random_uuid())
#   - Multitenant estricto: toda colección operacional lleva tenant_id FK -> tenants
#   - directus_users tiene tenant_id (FK tenants) para filtrado por rol
#   - Trazabilidad: cualquier cambio en tareas / movimientos_stock genera
#     evento en eventos_tarea con ubicacion_id + timestamp
#   - Roles fijos (UUID estables):
#       super-admin: 00000000-0000-0000-0000-000000000001  (built-in admin, sin filas de permiso)
#       tenant_admin: a1111111-1111-1111-1111-111111111111
#       trabajador:   b2222222-2222-2222-2222-222222222222
# ============================================================

