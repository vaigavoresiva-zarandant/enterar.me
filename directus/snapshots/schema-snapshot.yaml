# ============================================================
# PERMISOS POR ROL
# ============================================================
# Roles fijos:
#   tenant_admin = a1111111-1111-1111-1111-111111111111
#   trabajador   = b2222222-2222-2222-2222-222222222222
# El super-admin (built-in admin role) no necesita filas de
# permiso: tiene acceso implícito a todo.
# El seed/superadmin.json crea los roles con estos UUIDs.
# ------------------------------------------------------------
# El filtro multitenant se aplica con validation:
#   tenant_id: { _eq: "$CURRENT_USER.tenant_id" }
# en create y en permissions (read/update/delete).
# ============================================================

permissions:

  # ---------------- tenant_admin: gestión completa de SU tenant ----------------
  # Colecciones operacionales — todas filtradas por tenant_id

  # tenants: solo lectura del propio
  - role: a1111111-1111-1111-1111-111111111111
    collection: tenants
    action: read
    permissions:
      id: { _eq: "$CURRENT_USER.tenant_id" }
    validation: null
    fields: ['*']
    presets: null
  - role: a1111111-1111-1111-1111-111111111111
    collection: tenants
    action: update
    permissions:
      id: { _eq: "$CURRENT_USER.tenant_id" }
    validation: null
    fields: ['nombre','dominio','configuracion','estado']
    presets: null

  # planes: solo lectura
  - role: a1111111-1111-1111-1111-111111111111
    collection: planes
    action: read
    permissions: null
    validation: null
    fields: ['*']
    presets: null

  # suscripciones: solo lectura del propio tenant
  - role: a1111111-1111-1111-1111-111111111111
    collection: suscripciones
    action: read
    permissions:
      tenant_id: { _eq: "$CURRENT_USER.tenant_id" }
    validation: null
    fields: ['*']
    presets: null

  # sectores_mercado y plantillas_mercado: solo lectura (marketplace)
  - role: a1111111-1111-1111-1111-111111111111
    collection: sectores_mercado
    action: read
    permissions:
      activo: { _eq: true }
    validation: null
    fields: ['*']
    presets: null
  - role: a1111111-1111-1111-1111-111111111111
    collection: plantillas_mercado
    action: read
    permissions:
      activa: { _eq: true }
    validation: null
    fields: ['*']
    presets: null

  # instalaciones_mercado: lectura y creación (con tenant_id forzado)
  - role: a1111111-1111-1111-1111-111111111111
    collection: instalaciones_mercado
    action: read
