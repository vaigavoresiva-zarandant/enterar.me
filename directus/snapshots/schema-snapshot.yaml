    # =====================================================
    # EXTENSIÓN DE directus_users (colección del sistema)
    # =====================================================
    # Añadimos tenant_id a directus_users para permitir el filtro
    # multitenant por rol (validation: tenant_id == $CURRENT_USER.tenant_id).
    # Directus fusiona este campo con los del sistema; no toca los demás.
    - collection: directus_users
      schema:
        name: directus_users
