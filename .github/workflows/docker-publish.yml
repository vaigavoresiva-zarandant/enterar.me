# ============================================================
# ENTERAR.ME — Docker publish to GHCR
# ------------------------------------------------------------
# Se ejecuta al taggear v* (ej: git tag v0.1.0 && git push --tags).
# Construye y publica las 4 imágenes Docker a GHCR:
#   - ghcr.io/<owner>/enterarme-directus:latest
#   - ghcr.io/<owner>/enterarme-ai:latest
#   - ghcr.io/<owner>/enterarme-super-admin:latest
#   - ghcr.io/<owner>/enterarme-tenant-admin:latest
#
# Login a GHCR vía GITHUB_TOKEN automático (no hace falta secret).
# Las imágenes quedan públicas si el repo es público; si es privado,
# hay que dar permiso al Package desde la UI de GitHub.
# ============================================================
name: docker-publish

on:
  push:
    tags:
      - 'v*'

  # Permitir dispararlo manualmente desde la UI (Actions → Run workflow)
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: directus
            context: ./directus
            dockerfile: ./directus/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/enterarme-directus
          - service: ai
            context: ./ai
            dockerfile: ./ai/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/enterarme-ai
          - service: super-admin
            context: ./apps/super-admin
            dockerfile: ./apps/super-admin/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/enterarme-super-admin
          - service: tenant-admin
            context: ./apps/tenant-admin
            dockerfile: ./apps/tenant-admin/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/enterarme-tenant-admin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Summary
        run: |
          echo "### Imagen publicada: \`${{ matrix.service }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Imagen: ${{ matrix.image }}" >> $GITHUB_STEP_SUMMARY
          echo "Tags:   ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
